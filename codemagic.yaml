workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 60
    environment:
      vars:
        APP_URL: $APP_URL
        APP_NAME: $APP_NAME
        BUNDLE_ID: $BUNDLE_ID
        VERSION_NAME: $VERSION_NAME
        VERSION_CODE: $VERSION_CODE
        APPLE_TEAM_ID: $APPLE_TEAM_ID
      xcode: 26.2
      node: 20
    scripts:
      - name: Install Capacitor
        script: |
          npm init -y
          npm install @capacitor/core @capacitor/ios @capacitor/cli @capacitor/browser
      - name: Install selected plugins
        script: |
          PLUGINS=""
          [ "$PUSH_NOTIFICATIONS" = "true" ] && PLUGINS="$PLUGINS @capacitor/push-notifications"
          [ "$LOCAL_NOTIFICATIONS" = "true" ] && PLUGINS="$PLUGINS @capacitor/local-notifications"
          [ "$CAMERA" = "true" ] && PLUGINS="$PLUGINS @capacitor/camera"
          [ "$MICROPHONE" = "true" ] && PLUGINS="$PLUGINS @mozartec/capacitor-microphone"
          [ "$GEOLOCATION" = "true" ] && PLUGINS="$PLUGINS @capacitor/geolocation"
          [ "$BLUETOOTH" = "true" ] && PLUGINS="$PLUGINS @capacitor-community/bluetooth-le"
          [ "$NFC" = "true" ] && PLUGINS="$PLUGINS @capgo/capacitor-nfc"
          [ "$FLASHLIGHT" = "true" ] && PLUGINS="$PLUGINS @capawesome/capacitor-torch"
          [ "$HAPTICS" = "true" ] && PLUGINS="$PLUGINS @capacitor/haptics"
          [ "$SHARE" = "true" ] && PLUGINS="$PLUGINS @capacitor/share"
          [ "$FILESYSTEM" = "true" ] && PLUGINS="$PLUGINS @capacitor/filesystem"
          [ "$CLIPBOARD" = "true" ] && PLUGINS="$PLUGINS @capacitor/clipboard"
          [ "$NETWORK" = "true" ] && PLUGINS="$PLUGINS @capacitor/network"
          [ "$BIOMETRICS" = "true" ] && PLUGINS="$PLUGINS @aparajita/capacitor-biometric-auth"
          [ "$GOOGLE_AUTH" = "true" ] && PLUGINS="$PLUGINS @codetrix-studio/capacitor-google-auth"
          [ "$SIGN_IN_APPLE" = "true" ] && PLUGINS="$PLUGINS @capacitor-community/apple-sign-in"
          [ "$IN_APP_REVIEW" = "true" ] && PLUGINS="$PLUGINS @capacitor-community/in-app-review"
          [ "$IN_APP_PURCHASE" = "true" ] && PLUGINS="$PLUGINS @revenuecat/purchases-capacitor"
          [ "$SPLASH_SCREEN" = "true" ] && PLUGINS="$PLUGINS @capacitor/splash-screen"
          [ "$STATUS_BAR" = "true" ] && PLUGINS="$PLUGINS @capacitor/status-bar"
          [ "$KEEP_AWAKE" = "true" ] && PLUGINS="$PLUGINS @capacitor-community/keep-awake"
          [ "$KEYBOARD" = "true" ] && PLUGINS="$PLUGINS @capacitor/keyboard"
          [ "$APP_BADGES" = "true" ] && PLUGINS="$PLUGINS @capawesome/capacitor-badge"
          if [ -n "$PLUGINS" ]; then
            echo "Installing plugins: $PLUGINS"
            npm install $PLUGINS --legacy-peer-deps
          else
            echo "No plugins selected"
          fi
      - name: Create Capacitor config
        script: |
          cat > capacitor.config.json << CAPEOF
          {
            "appId": "$BUNDLE_ID",
            "appName": "$APP_NAME",
            "webDir": "www",
            "server": {
              "url": "$APP_URL",
              "cleartext": true,
              "allowNavigation": ["*"]
            }
          }
          CAPEOF
          mkdir -p www
          echo "<html><body><h1>$APP_NAME</h1></body></html>" > www/index.html
      - name: Add iOS platform
        script: |
          npx cap add ios
          cd ios/App
          sed -i '' "s/platform :ios, '[0-9.]*'/platform :ios, '16.0'/" Podfile
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*/IPHONEOS_DEPLOYMENT_TARGET = 16.0/g' App.xcodeproj/project.pbxproj
          cd ../..
          npx cap sync ios
      - name: Inject native features
        script: |
          cat > "ios/App/App/ViewController.swift" << 'VCEOF'
          import UIKit
          import Capacitor
          import WebKit
          import LocalAuthentication
          import AVFoundation

          class ViewController: CAPBridgeViewController {
              var refreshControl: UIRefreshControl!
              var progressView: UIProgressView!
              var observation: NSKeyValueObservation?
              var isAuthenticated = false

              override func viewDidLoad() {
                  super.viewDidLoad()
                  setupPullToRefresh()
                  setupProgressBar()
                  setupWebViewDelegate()
                  setupScreenshotPrevention()
                  setupQRScannerBridge()
                  authenticateIfNeeded()
              }

              // MARK: - Batch 1: Pull to refresh
              func setupPullToRefresh() {
                  refreshControl = UIRefreshControl()
                  refreshControl.addTarget(self, action: #selector(refreshWebView), for: .valueChanged)
                  webView?.scrollView.addSubview(refreshControl)
                  webView?.scrollView.bounces = true
              }

              @objc func refreshWebView() {
                  webView?.reload()
                  DispatchQueue.main.asyncAfter(deadline: .now() + 1.0) {
                      self.refreshControl.endRefreshing()
                  }
              }

              // MARK: - Batch 1: Progress bar
              func setupProgressBar() {
                  progressView = UIProgressView(progressViewStyle: .bar)
                  progressView.translatesAutoresizingMaskIntoConstraints = false
                  progressView.tintColor = .black
                  progressView.trackTintColor = .clear
                  view.addSubview(progressView)
                  NSLayoutConstraint.activate([
                      progressView.topAnchor.constraint(equalTo: view.safeAreaLayoutGuide.topAnchor),
                      progressView.leadingAnchor.constraint(equalTo: view.leadingAnchor),
                      progressView.trailingAnchor.constraint(equalTo: view.trailingAnchor),
                      progressView.heightAnchor.constraint(equalToConstant: 3)
                  ])
                  observation = webView?.observe(\.estimatedProgress, options: [.new]) { [weak self] _, change in
                      DispatchQueue.main.async {
                          let progress = Float(change.newValue ?? 0)
                          self?.progressView.setProgress(progress, animated: true)
                          self?.progressView.isHidden = progress >= 1.0
                      }
                  }
              }

              func setupWebViewDelegate() {
                  webView?.navigationDelegate = self
              }

              // MARK: - Batch 2: Screenshot prevention
              func setupScreenshotPrevention() {
                  let field = UITextField()
                  field.isSecureTextEntry = true
                  field.translatesAutoresizingMaskIntoConstraints = false
                  view.addSubview(field)
                  view.layer.superlayer?.addSublayer(field.layer)
                  field.layer.sublayers?.first?.addSublayer(view.layer)
              }

              // MARK: - Batch 2: Biometric app lock
              func authenticateIfNeeded() {
                  let context = LAContext()
                  var error: NSError?
                  if context.canEvaluatePolicy(.deviceOwnerAuthenticationWithBiometrics, error: &error) {
                      context.evaluatePolicy(.deviceOwnerAuthenticationWithBiometrics,
                          localizedReason: "Authenticate to access the app") { success, _ in
                          DispatchQueue.main.async {
                              self.isAuthenticated = success
                              if !success {
                                  self.webView?.isHidden = true
                              } else {
                                  self.webView?.isHidden = false
                              }
                          }
                      }
                  } else {
                      isAuthenticated = true
                  }
              }

              // MARK: - Batch 2: QR Scanner bridge
              func setupQRScannerBridge() {
                  let script = WKUserScript(source: """
                      window.NativeQRScanner = {
                          scan: function(callback) {
                              window.webkit.messageHandlers.qrScanner.postMessage({action: 'scan'});
                              window.__qrCallback = callback;
                          }
                      };
                  """, injectionTime: .atDocumentStart, forMainFrameOnly: false)
                  webView?.configuration.userContentController.addUserScript(script)
                  webView?.configuration.userContentController.add(self, name: "qrScanner")
              }

              deinit {
                  observation?.invalidate()
              }
          }

          // MARK: - WKNavigationDelegate
          extension ViewController: WKNavigationDelegate {
              func webView(_ webView: WKWebView, didFailProvisionalNavigation navigation: WKNavigation!, withError error: Error) {
                  let errorHTML = """
                  <html>
                  <body style="font-family:sans-serif;text-align:center;padding:50px;background:#f5f5f5">
                  <h2 style="color:#333">No Internet Connection</h2>
                  <p style="color:#666">Please check your connection and try again.</p>
                  <button onclick="window.location.reload()" style="padding:12px 24px;background:#000;color:#fff;border:none;border-radius:8px;font-size:16px">Try Again</button>
                  </body>
                  </html>
                  """
                  webView.loadHTMLString(errorHTML, baseURL: nil)
              }
          }

          // MARK: - WKScriptMessageHandler for QR Scanner
          extension ViewController: WKScriptMessageHandler {
              func userContentController(_ userContentController: WKUserContentController, didReceive message: WKScriptMessage) {
                  if message.name == "qrScanner" {
                      presentQRScanner()
                  }
              }

              func presentQRScanner() {
                  let scanner = QRScannerViewController()
                  scanner.delegate = self
                  present(scanner, animated: true)
              }
          }

          // MARK: - QR Scanner delegate
          extension ViewController: QRScannerDelegate {
              func didScanCode(_ code: String) {
                  webView?.evaluateJavaScript("if(window.__qrCallback) window.__qrCallback('\(code)');", completionHandler: nil)
              }
          }

          // MARK: - QR Scanner ViewController
          protocol QRScannerDelegate: AnyObject {
              func didScanCode(_ code: String)
          }

          class QRScannerViewController: UIViewController, AVCaptureMetadataOutputObjectsDelegate {
              weak var delegate: QRScannerDelegate?
              var captureSession: AVCaptureSession!
              var previewLayer: AVCaptureVideoPreviewLayer!

              override func viewDidLoad() {
                  super.viewDidLoad()
                  view.backgroundColor = .black
                  setupCamera()
                  addCloseButton()
              }

              func addCloseButton() {
                  let button = UIButton(type: .system)
                  button.setTitle("Close", for: .normal)
                  button.setTitleColor(.white, for: .normal)
                  button.translatesAutoresizingMaskIntoConstraints = false
                  view.addSubview(button)
                  NSLayoutConstraint.activate([
                      button.topAnchor.constraint(equalTo: view.safeAreaLayoutGuide.topAnchor, constant: 16),
                      button.trailingAnchor.constraint(equalTo: view.trailingAnchor, constant: -16)
                  ])
                  button.addTarget(self, action: #selector(closeScanner), for: .touchUpInside)
              }

              @objc func closeScanner() {
                  dismiss(animated: true)
              }

              func setupCamera() {
                  captureSession = AVCaptureSession()
                  guard let device = AVCaptureDevice.default(for: .video),
                        let input = try? AVCaptureDeviceInput(device: device) else { return }
                  captureSession.addInput(input)
                  let output = AVCaptureMetadataOutput()
                  captureSession.addOutput(output)
                  output.setMetadataObjectsDelegate(self, queue: .main)
                  output.metadataObjectTypes = [.qr, .ean8, .ean13, .code128, .code39]
                  previewLayer = AVCaptureVideoPreviewLayer(session: captureSession)
                  previewLayer.frame = view.layer.bounds
                  previewLayer.videoGravity = .resizeAspectFill
                  view.layer.addSublayer(previewLayer)
                  DispatchQueue.global(qos: .background).async {
                      self.captureSession.startRunning()
                  }
              }

              func metadataOutput(_ output: AVCaptureMetadataOutput, didOutput metadataObjects: [AVMetadataObject], from connection: AVCaptureConnection) {
                  if let object = metadataObjects.first as? AVMetadataMachineReadableCodeObject,
                     let code = object.stringValue {
                      captureSession.stopRunning()
                      dismiss(animated: true) {
                          self.delegate?.didScanCode(code)
                      }
                  }
              }
          }
          VCEOF
          echo "Native features injected"

          # Add deep linking to Info.plist
          PLIST="ios/App/App/Info.plist"
          plutil -insert CFBundleURLTypes -json '[{"CFBundleURLSchemes":["'"$BUNDLE_ID"'"]}]' $PLIST 2>/dev/null || true

          # Add app shortcuts
          cat >> ios/App/App/Info.plist << 'SHORTCUTEOF'
          <!-- App shortcuts handled via URL scheme -->
          SHORTCUTEOF
          echo "Deep linking configured"
      - name: Inject iOS permissions
        script: |
          PLIST="ios/App/App/Info.plist"
          [ "$CAMERA" = "true" ] && plutil -insert NSCameraUsageDescription -string "This app requires camera access" $PLIST 2>/dev/null || true
          [ "$CAMERA" = "true" ] && plutil -insert NSPhotoLibraryUsageDescription -string "This app requires photo library access" $PLIST 2>/dev/null || true
          [ "$CAMERA" = "true" ] && plutil -insert NSPhotoLibraryAddUsageDescription -string "This app requires photo library access" $PLIST 2>/dev/null || true
          [ "$MICROPHONE" = "true" ] && plutil -insert NSMicrophoneUsageDescription -string "This app requires microphone access" $PLIST 2>/dev/null || true
          [ "$GEOLOCATION" = "true" ] && plutil -insert NSLocationWhenInUseUsageDescription -string "This app requires location access" $PLIST 2>/dev/null || true
          [ "$GEOLOCATION" = "true" ] && plutil -insert NSLocationAlwaysAndWhenInUseUsageDescription -string "This app requires location access" $PLIST 2>/dev/null || true
          [ "$GEOLOCATION" = "true" ] && plutil -insert NSLocationAlwaysUsageDescription -string "This app requires location access" $PLIST 2>/dev/null || true
          [ "$BLUETOOTH" = "true" ] && plutil -insert NSBluetoothAlwaysUsageDescription -string "This app requires Bluetooth access" $PLIST 2>/dev/null || true
          [ "$BLUETOOTH" = "true" ] && plutil -insert NSBluetoothPeripheralUsageDescription -string "This app requires Bluetooth access" $PLIST 2>/dev/null || true
          [ "$NFC" = "true" ] && plutil -insert NFCReaderUsageDescription -string "This app requires NFC access" $PLIST 2>/dev/null || true
          [ "$PUSH_NOTIFICATIONS" = "true" ] && plutil -insert NSUserNotificationsUsageDescription -string "This app requires notification access" $PLIST 2>/dev/null || true
          # Always add camera permission for QR scanner
          plutil -insert NSCameraUsageDescription -string "This app requires camera access for QR scanning" $PLIST 2>/dev/null || true
      - name: Inject print bridge
        script: |
          cat > ios/App/App/PrintBridge.swift << 'SWIFTEOF'
          import Foundation
          import WebKit
          import UIKit

          @objc class PrintBridgeHandler: NSObject, WKScriptMessageHandler {
              weak var webView: WKWebView?

              public func userContentController(_ userContentController: WKUserContentController, didReceive message: WKScriptMessage) {
                  guard let body = message.body as? [String: Any] else { return }
                  let action = body["action"] as? String ?? ""
                  DispatchQueue.main.async {
                      switch action {
                      case "printCurrentPage":
                          self.printWebView()
                      case "printURL":
                          if let url = body["url"] as? String { self.printFromURL(url) }
                      case "printHTML":
                          if let html = body["html"] as? String { self.printFromHTML(html) }
                      default:
                          break
                      }
                  }
              }

              func printWebView() {
                  guard let webView = webView else { return }
                  let printController = UIPrintInteractionController.shared
                  let printInfo = UIPrintInfo.printInfo()
                  printInfo.outputType = .general
                  printController.printInfo = printInfo
                  printController.printFormatter = webView.viewPrintFormatter()
                  printController.present(animated: true, completionHandler: nil)
              }

              func printFromURL(_ urlString: String) {
                  guard let url = URL(string: urlString) else { return }
                  let printController = UIPrintInteractionController.shared
                  let printInfo = UIPrintInfo.printInfo()
                  printInfo.outputType = .general
                  printController.printInfo = printInfo
                  printController.printingItem = url
                  printController.present(animated: true, completionHandler: nil)
              }

              func printFromHTML(_ html: String) {
                  let printController = UIPrintInteractionController.shared
                  let printInfo = UIPrintInfo.printInfo()
                  printInfo.outputType = .general
                  printController.printInfo = printInfo
                  let formatter = UIMarkupTextPrintFormatter(markupText: html)
                  printController.printFormatter = formatter
                  printController.present(animated: true, completionHandler: nil)
              }
          }
          SWIFTEOF
          echo "iOS print bridge created"
      - name: Inject app icon
        script: |
          if [ -n "$APP_ICON_B64" ]; then
            echo "Injecting app icon..."
            echo "$APP_ICON_B64" | base64 --decode > /tmp/app_icon.png
            ICON_DIR="ios/App/App/Assets.xcassets/AppIcon.appiconset"
            sips -z 20 20 /tmp/app_icon.png --out "$ICON_DIR/AppIcon-20x20@1x.png" 2>/dev/null || true
            sips -z 40 40 /tmp/app_icon.png --out "$ICON_DIR/AppIcon-20x20@2x.png" 2>/dev/null || true
            sips -z 60 60 /tmp/app_icon.png --out "$ICON_DIR/AppIcon-20x20@3x.png" 2>/dev/null || true
            sips -z 29 29 /tmp/app_icon.png --out "$ICON_DIR/AppIcon-29x29@1x.png" 2>/dev/null || true
            sips -z 58 58 /tmp/app_icon.png --out "$ICON_DIR/AppIcon-29x29@2x.png" 2>/dev/null || true
            sips -z 87 87 /tmp/app_icon.png --out "$ICON_DIR/AppIcon-29x29@3x.png" 2>/dev/null || true
            sips -z 40 40 /tmp/app_icon.png --out "$ICON_DIR/AppIcon-40x40@1x.png" 2>/dev/null || true
            sips -z 80 80 /tmp/app_icon.png --out "$ICON_DIR/AppIcon-40x40@2x.png" 2>/dev/null || true
            sips -z 120 120 /tmp/app_icon.png --out "$ICON_DIR/AppIcon-40x40@3x.png" 2>/dev/null || true
            sips -z 120 120 /tmp/app_icon.png --out "$ICON_DIR/AppIcon-60x60@2x.png" 2>/dev/null || true
            sips -z 180 180 /tmp/app_icon.png --out "$ICON_DIR/AppIcon-60x60@3x.png" 2>/dev/null || true
            sips -z 76 76 /tmp/app_icon.png --out "$ICON_DIR/AppIcon-76x76@1x.png" 2>/dev/null || true
            sips -z 152 152 /tmp/app_icon.png --out "$ICON_DIR/AppIcon-76x76@2x.png" 2>/dev/null || true
            sips -z 167 167 /tmp/app_icon.png --out "$ICON_DIR/AppIcon-83.5x83.5@2x.png" 2>/dev/null || true
            sips -z 1024 1024 /tmp/app_icon.png --out "$ICON_DIR/AppIcon-1024x1024@1x.png" 2>/dev/null || true
            echo "Icon injection complete"
          else
            echo "No icon provided, using default"
          fi
      - name: Fix scheme for workspace
        script: |
          mkdir -p ios/App/App.xcworkspace/xcshareddata/xcschemes
          SCHEME_FILE=$(ls ios/App/App.xcodeproj/xcshareddata/xcschemes/ 2>/dev/null | head -1)
          if [ -n "$SCHEME_FILE" ]; then
            cp "ios/App/App.xcodeproj/xcshareddata/xcschemes/$SCHEME_FILE" "ios/App/App.xcworkspace/xcshareddata/xcschemes/$SCHEME_FILE"
          fi
      - name: Register app capabilities
        script: |
          echo "$APP_STORE_CONNECT_PRIVATE_KEY_B64" | base64 --decode > /tmp/api_key.p8
          BUNDLE_ID_ID=$(app-store-connect bundle-ids list \
            --private-key @file:/tmp/api_key.p8 \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --json | python3 -c "import sys,json; data=json.load(sys.stdin); items=[x for x in data if x.get('attributes',{}).get('identifier')=='$BUNDLE_ID']; print(items[0]['id'] if items else '')" 2>/dev/null)
          echo "Bundle ID resource ID: $BUNDLE_ID_ID"
          if [ -z "$BUNDLE_ID_ID" ]; then
            echo "Could not find Bundle ID, skipping capabilities"
          else
            enable_capability() {
              app-store-connect bundle-ids capabilities create \
                "$BUNDLE_ID_ID" \
                --capability-type "$1" \
                --private-key @file:/tmp/api_key.p8 \
                --key-id "$APP_STORE_CONNECT_KEY_ID" \
                --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" 2>/dev/null || true
              echo "Enabled capability: $1"
            }
            [ "$PUSH_NOTIFICATIONS" = "true" ] && enable_capability "PUSH_NOTIFICATIONS"
            [ "$IN_APP_PURCHASE" = "true" ] && enable_capability "IN_APP_PURCHASE"
            [ "$SIGN_IN_APPLE" = "true" ] && enable_capability "SIGN_IN_WITH_APPLE"
            [ "$BLUETOOTH" = "true" ] && enable_capability "WIRELESS_ACCESSORY_CONFIGURATION"
            [ "$NFC" = "true" ] && enable_capability "NFC_TAG_READING"
            echo "Capabilities registration complete"
          fi
      - name: Set up keychain and code signing
        script: |
          keychain initialize
          echo "$CERTIFICATE_PRIVATE_KEY_B64" | base64 --decode > /tmp/certificate_key.pem
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key @file:/tmp/certificate_key.pem \
            --private-key @file:/tmp/api_key.p8 \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Create ExportOptions
        script: |
          cat > ios/App/ExportOptions.plist << EXPORTEOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>teamID</key>
              <string>$APPLE_TEAM_ID</string>
              <key>signingStyle</key>
              <string>automatic</string>
          </dict>
          </plist>
          EXPORTEOF
      - name: Build IPA
        script: |
          cd ios/App
          SCHEME=$(xcodebuild -project App.xcodeproj -list | grep -A 10 "Schemes:" | grep -v "Schemes:" | head -1 | xargs)
          echo "Building scheme: $SCHEME"
          xcodebuild -workspace App.xcworkspace \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath App.xcarchive \
            -destination generic/platform=iOS \
            archive
          xcodebuild -exportArchive \
            -archivePath App.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath output \
            -allowProvisioningUpdates \
            -authenticationKeyPath /tmp/api_key.p8 \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID"
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_ID
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
    artifacts:
      - ios/App/output/*.ipa
