workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 60
    environment:
      vars:
        APP_URL: $APP_URL
        APP_NAME: $APP_NAME
        BUNDLE_ID: $BUNDLE_ID
        VERSION_NAME: $VERSION_NAME
        VERSION_CODE: $VERSION_CODE
        APPLE_TEAM_ID: $APPLE_TEAM_ID
      xcode: latest
      node: 20
    scripts:
      - name: Install Capacitor
        script: |
          npm init -y
          npm install @capacitor/core@5.7.0 @capacitor/ios@5.7.0 @capacitor/cli@5.7.0
      - name: Create Capacitor config
        script: |
          cat > capacitor.config.json << EOF
          {
            "appId": "$BUNDLE_ID",
            "appName": "$APP_NAME",
            "webDir": "www",
            "server": {
              "url": "$APP_URL",
              "cleartext": true
            }
          }
          EOF
          mkdir -p www
          echo "<html><body><h1>$APP_NAME</h1></body></html>" > www/index.html
      - name: Add iOS platform
        script: |
          npx cap add ios
          npx cap sync ios
      - name: Fix scheme for workspace
        script: |
          mkdir -p ios/App/App.xcworkspace/xcshareddata/xcschemes
          SCHEME_FILE=$(ls ios/App/App.xcodeproj/xcshareddata/xcschemes/ 2>/dev/null | head -1)
          if [ -n "$SCHEME_FILE" ]; then
            cp "ios/App/App.xcodeproj/xcshareddata/xcschemes/$SCHEME_FILE" "ios/App/App.xcworkspace/xcshareddata/xcschemes/$SCHEME_FILE"
          fi
      - name: Set up keychain and code signing
        script: |
          keychain initialize
          echo "$CERTIFICATE_PRIVATE_KEY_B64" | base64 --decode > /tmp/certificate_key.pem
          echo "$APP_STORE_CONNECT_PRIVATE_KEY_B64" | base64 --decode > /tmp/api_key.p8
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key @file:/tmp/certificate_key.pem \
            --private-key @file:/tmp/api_key.p8 \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Create ExportOptions
        script: |
          TEAM_ID=$(grep -m1 "DEVELOPMENT_TEAM = [A-Z0-9]" ios/App/App.xcodeproj/project.pbxproj | grep -o '[A-Z0-9]\{10\}' | head -1)
          echo "Team ID found: $TEAM_ID"
          cat > ios/App/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>teamID</key>
              <string>$TEAM_ID</string>
              <key>signingStyle</key>
              <string>automatic</string>
          </dict>
          </plist>
          EOF
      - name: Build IPA
        script: |
          cd ios/App
          SCHEME=$(xcodebuild -project App.xcodeproj -list | grep -A 10 "Schemes:" | grep -v "Schemes:" | head -1 | xargs)
          echo "Building scheme: $SCHEME"
          xcodebuild -workspace App.xcworkspace \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath App.xcarchive \
            -destination generic/platform=iOS \
            archive
          xcodebuild -exportArchive \
            -archivePath App.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath output
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_ID
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
    artifacts:
      - ios/App/output/*.ipa
