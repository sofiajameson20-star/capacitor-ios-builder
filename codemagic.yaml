workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 60
    environment:
      vars:
        APP_URL: $APP_URL
        APP_NAME: $APP_NAME
        BUNDLE_ID: $BUNDLE_ID
        VERSION_NAME: $VERSION_NAME
        VERSION_CODE: $VERSION_CODE
      xcode: latest
      node: 20
    scripts:
      - name: Install Capacitor
        script: |
          npm init -y
          npm install @capacitor/core @capacitor/ios @capacitor/cli
      - name: Create Capacitor config
        script: |
          cat > capacitor.config.json << EOF
          {
            "appId": "$BUNDLE_ID",
            "appName": "$APP_NAME",
            "webDir": "www",
            "server": {
              "url": "$APP_URL",
              "cleartext": true
            },
            "ios": {
              "minVersion": "14.0"
            }
          }
          EOF
          mkdir -p www
          echo "<html><body><h1>$APP_NAME</h1></body></html>" > www/index.html
      - name: Add iOS platform
        script: |
          npx cap add ios
          cd ios/App
          sed -i '' "s/platform :ios, '[0-9.]*'/platform :ios, '14.0'/" Podfile
          pod install --repo-update
          cd ../..
      - name: Generate Xcode schemes
        script: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -list 2>/dev/null || true
          xcodebuild -project App.xcodeproj -scheme App -allowProvisioningUpdates 2>/dev/null || true
          open -a Xcode App.xcworkspace 2>/dev/null || true
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -destination generic/platform=iOS \
            CODE_SIGNING_ALLOWED=NO \
            -showBuildSettings 2>/dev/null || true
          ls -la App.xcodeproj/xcshareddata/xcschemes/ 2>/dev/null || echo "No schemes directory"
          cd ../..
      - name: Create scheme manually
        script: |
          mkdir -p ios/App/App.xcodeproj/xcshareddata/xcschemes
          cat > ios/App/App.xcodeproj/xcshareddata/xcschemes/App.xcscheme << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <Scheme LastUpgradeVersion="1300" version="1.3">
            <BuildAction parallelizeBuildables="YES" buildImplicitDependencies="YES">
              <BuildActionEntries>
                <BuildActionEntry buildForTesting="YES" buildForRunning="YES" buildForProfiling="YES" buildForArchiving="YES" buildForAnalyzing="YES">
                  <BuildableReference BuildableIdentifier="primary" BlueprintIdentifier="1F1A982E26350A4200B9A866" BuildableName="App.app" BlueprintName="App" ReferencedContainer="container:App.xcodeproj">
                  </BuildableReference>
                </BuildActionEntry>
              </BuildActionEntries>
            </BuildAction>
            <ArchiveAction buildConfiguration="Release" revealArchiveInOrganizer="YES">
            </ArchiveAction>
          </Scheme>
          EOF
      - name: Create ExportOptions
        script: |
          cat > ios/App/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>development</string>
              <key>compileBitcode</key>
              <false/>
          </dict>
          </plist>
          EOF
      - name: Build IPA
        script: |
          xcodebuild -workspace ios/App/App.xcworkspace -list
          xcodebuild -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath ios/App/App.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            archive
          xcodebuild -exportArchive \
            -archivePath ios/App/App.xcarchive \
            -exportOptionsPlist ios/App/ExportOptions.plist \
            -exportPath ios/App/output
    artifacts:
      - ios/App/output/*.ipa
