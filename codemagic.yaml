workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 60
    environment:
      vars:
        APP_URL: $APP_URL
        APP_NAME: $APP_NAME
        BUNDLE_ID: $BUNDLE_ID
        VERSION_NAME: $VERSION_NAME
        VERSION_CODE: $VERSION_CODE
      xcode: latest
      node: 20
    scripts:
      - name: Install Capacitor
        script: |
          npm init -y
          npm install @capacitor/core @capacitor/ios @capacitor/cli
      - name: Create Capacitor config
        script: |
          cat > capacitor.config.json << EOF
          {
            "appId": "$BUNDLE_ID",
            "appName": "$APP_NAME",
            "webDir": "www",
            "server": {
              "url": "$APP_URL",
              "cleartext": true
            },
            "ios": {
              "minVersion": "14.0"
            }
          }
          EOF
          mkdir -p www
          echo "<html><body><h1>$APP_NAME</h1></body></html>" > www/index.html
      - name: Add iOS platform
        script: |
          CAPACITOR_SKIP_PODS=1 npx cap add ios || true
      - name: Fix Podfile and install pods
        script: |
          cd ios/App
          printf "require_relative '../../node_modules/@capacitor/ios/scripts/pods_helpers'\nplatform :ios, '14.0'\nuse_frameworks!\ninstall! 'cocoapods', :disable_input_output_paths => true\ndef capacitor_pods\n  pod 'Capacitor', :path => '../../node_modules/@capacitor/ios'\n  pod 'CapacitorCordova', :path => '../../node_modules/@capacitor/ios'\nend\ntarget 'App' do\n  capacitor_pods\nend\npost_install do |installer|\n  installer.pods_project.targets.each do |target|\n    target.build_configurations.each do |config|\n      config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '14.0'\n    end\n  end\nend\n" > Podfile
          pod install --repo-update
          cd ../..
      - name: Remove stale references
        script: |
          cd ios/App
          sed -i '' '/Pods-App.debug.xcconfig/d' App.xcodeproj/project.pbxproj
          sed -i '' '/Pods-App.release.xcconfig/d' App.xcodeproj/project.pbxproj
          sed -i '' '/Check Pods Manifest.lock/d' App.xcodeproj/project.pbxproj
          sed -i '' '/6634F4EFEBD30273BCE97C65/d' App.xcodeproj/project.pbxproj
          cd ../..
      - name: Create ExportOptions
        script: |
          cat > ios/App/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>development</string>
              <key>compileBitcode</key>
              <false/>
          </dict>
          </plist>
          EOF
      - name: Build IPA
        script: |
          cd ios/App
          SCHEME=$(xcodebuild -project App.xcodeproj -list | grep -A 10 "Schemes:" | grep -v "Schemes:" | head -1 | xargs)
          echo "Building scheme: $SCHEME"
          xcodebuild -project App.xcodeproj \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath App.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            archive
          xcodebuild -exportArchive \
            -archivePath App.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath output
    artifacts:
      - ios/App/output/*.ipa
