workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 60
    environment:
      vars:
        APP_URL: $APP_URL
        APP_NAME: $APP_NAME
        BUNDLE_ID: $BUNDLE_ID
        VERSION_NAME: $VERSION_NAME
        VERSION_CODE: $VERSION_CODE
        APPLE_TEAM_ID: $APPLE_TEAM_ID
      xcode: latest
      node: 20
    scripts:
      - name: Install Capacitor
        script: |
          npm init -y
          npm install @capacitor/core @capacitor/ios @capacitor/cli
      - name: Install selected plugins
        script: |
          PLUGINS=""
          [ "$PUSH_NOTIFICATIONS" = "true" ] && PLUGINS="$PLUGINS @capacitor/push-notifications"
          [ "$LOCAL_NOTIFICATIONS" = "true" ] && PLUGINS="$PLUGINS @capacitor/local-notifications"
          [ "$CAMERA" = "true" ] && PLUGINS="$PLUGINS @capacitor/camera"
          [ "$MICROPHONE" = "true" ] && PLUGINS="$PLUGINS @mozartec/capacitor-microphone"
          [ "$GEOLOCATION" = "true" ] && PLUGINS="$PLUGINS @capacitor/geolocation"
          [ "$BLUETOOTH" = "true" ] && PLUGINS="$PLUGINS @capacitor-community/bluetooth-le"
          [ "$NFC" = "true" ] && PLUGINS="$PLUGINS @capacitor-community/nfc"
          [ "$FLASHLIGHT" = "true" ] && PLUGINS="$PLUGINS @capacitor-community/torch"
          [ "$HAPTICS" = "true" ] && PLUGINS="$PLUGINS @capacitor/haptics"
          [ "$SHARE" = "true" ] && PLUGINS="$PLUGINS @capacitor/share"
          [ "$FILESYSTEM" = "true" ] && PLUGINS="$PLUGINS @capacitor/filesystem"
          [ "$CLIPBOARD" = "true" ] && PLUGINS="$PLUGINS @capacitor/clipboard"
          [ "$NETWORK" = "true" ] && PLUGINS="$PLUGINS @capacitor/network"
          [ "$BIOMETRICS" = "true" ] && PLUGINS="$PLUGINS @capacitor/biometrics"
          [ "$GOOGLE_AUTH" = "true" ] && PLUGINS="$PLUGINS @codetrix-studio/capacitor-google-auth"
          [ "$SIGN_IN_APPLE" = "true" ] && PLUGINS="$PLUGINS @capacitor-community/apple-sign-in"
          [ "$IN_APP_REVIEW" = "true" ] && PLUGINS="$PLUGINS @capacitor-community/in-app-review"
          [ "$IN_APP_PURCHASE" = "true" ] && PLUGINS="$PLUGINS @revenuecat/purchases-capacitor"
          [ "$SPLASH_SCREEN" = "true" ] && PLUGINS="$PLUGINS @capacitor/splash-screen"
          [ "$STATUS_BAR" = "true" ] && PLUGINS="$PLUGINS @capacitor/status-bar"
          [ "$KEEP_AWAKE" = "true" ] && PLUGINS="$PLUGINS @capacitor-community/keep-awake"
          [ "$KEYBOARD" = "true" ] && PLUGINS="$PLUGINS @capacitor/keyboard"
          [ "$APP_BADGES" = "true" ] && PLUGINS="$PLUGINS @capawesome/capacitor-badge"
          [ "$BACKGROUND_SYNC" = "true" ] && PLUGINS="$PLUGINS @capacitor/background-runner"
          if [ -n "$PLUGINS" ]; then
            echo "Installing plugins: $PLUGINS"
            npm install $PLUGINS --legacy-peer-deps
          else
            echo "No plugins selected"
          fi
      - name: Create Capacitor config
        script: |
          cat > capacitor.config.json << EOF
          {
            "appId": "$BUNDLE_ID",
            "appName": "$APP_NAME",
            "webDir": "www",
            "server": {
              "url": "$APP_URL",
              "cleartext": true
            }
          }
          EOF
          mkdir -p www
          echo "<html><body><h1>$APP_NAME</h1></body></html>" > www/index.html
      - name: Add iOS platform
        script: |
          npx cap add ios
          npx cap sync ios
      - name: Inject iOS permissions
        script: |
          PLIST="ios/App/App/Info.plist"
          [ "$CAMERA" = "true" ] && plutil -insert NSCameraUsageDescription -string "This app requires camera access" $PLIST 2>/dev/null || true
          [ "$MICROPHONE" = "true" ] && plutil -insert NSMicrophoneUsageDescription -string "This app requires microphone access" $PLIST 2>/dev/null || true
          [ "$GEOLOCATION" = "true" ] && plutil -insert NSLocationWhenInUseUsageDescription -string "This app requires location access" $PLIST 2>/dev/null || true
          [ "$BLUETOOTH" = "true" ] && plutil -insert NSBluetoothAlwaysUsageDescription -string "This app requires Bluetooth access" $PLIST 2>/dev/null || true
          [ "$NFC" = "true" ] && plutil -insert NFCReaderUsageDescription -string "This app requires NFC access" $PLIST 2>/dev/null || true
          [ "$PUSH_NOTIFICATIONS" = "true" ] && plutil -insert NSUserNotificationsUsageDescription -string "This app requires notification access" $PLIST 2>/dev/null || true
      - name: Fix scheme for workspace
        script: |
          mkdir -p ios/App/App.xcworkspace/xcshareddata/xcschemes
          SCHEME_FILE=$(ls ios/App/App.xcodeproj/xcshareddata/xcschemes/ 2>/dev/null | head -1)
          if [ -n "$SCHEME_FILE" ]; then
            cp "ios/App/App.xcodeproj/xcshareddata/xcschemes/$SCHEME_FILE" "ios/App/App.xcworkspace/xcshareddata/xcschemes/$SCHEME_FILE"
          fi
      - name: Set up keychain and code signing
        script: |
          keychain initialize
          echo "$CERTIFICATE_PRIVATE_KEY_B64" | base64 --decode > /tmp/certificate_key.pem
          echo "$APP_STORE_CONNECT_PRIVATE_KEY_B64" | base64 --decode > /tmp/api_key.p8
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key @file:/tmp/certificate_key.pem \
            --private-key @file:/tmp/api_key.p8 \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Create ExportOptions
        script: |
          cat > ios/App/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>teamID</key>
              <string>$APPLE_TEAM_ID</string>
              <key>signingStyle</key>
              <string>automatic</string>
          </dict>
          </plist>
          EOF
      - name: Build IPA
        script: |
          cd ios/App
          SCHEME=$(xcodebuild -project App.xcodeproj -list | grep -A 10 "Schemes:" | grep -v "Schemes:" | head -1 | xargs)
          echo "Building scheme: $SCHEME"
          xcodebuild -workspace App.xcworkspace \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath App.xcarchive \
            -destination generic/platform=iOS \
            archive
          xcodebuild -exportArchive \
            -archivePath App.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath output \
            -allowProvisioningUpdates \
            -authenticationKeyPath /tmp/api_key.p8 \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID"
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_ID
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
    artifacts:
      - ios/App/output/*.ipa
